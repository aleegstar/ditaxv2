<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Anmeldung...</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      .logo {
        width: 80px;
        height: 80px;
        margin-bottom: 2rem;
      }
      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1.5rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .status {
        font-size: 1rem;
        color: #888;
      }
      .error {
        color: #ef4444;
        margin-top: 1rem;
      }
      .debug {
        margin-top: 2rem;
        padding: 1rem;
        background: rgba(255,255,255,0.05);
        border-radius: 8px;
        font-size: 0.75rem;
        color: #666;
        text-align: left;
        max-width: 90vw;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/ditax-logo-new.svg" alt="Ditax" class="logo" onerror="this.style.display='none'" />
      <div class="loader" id="loader"></div>
      <p class="status" id="status">Anmeldung wird verarbeitet...</p>
    </div>

    <script>
      (function() {
        var statusEl = document.getElementById('status');
        var loaderEl = document.getElementById('loader');
        
        try {
          // Parse tokens from hash or query
          var hash = window.location.hash.substring(1);
          var hashParams = new URLSearchParams(hash);
          var queryParams = new URLSearchParams(window.location.search);
          
          var scheme = queryParams.get('deeplink_scheme') || 'ditax';
          var accessToken = hashParams.get('access_token') || queryParams.get('access_token');
          var refreshToken = hashParams.get('refresh_token') || queryParams.get('refresh_token');
          var expiresIn = hashParams.get('expires_in') || queryParams.get('expires_in');
          var tokenType = hashParams.get('token_type') || queryParams.get('token_type');
          var error = hashParams.get('error') || queryParams.get('error');
          var errorDescription = hashParams.get('error_description') || queryParams.get('error_description');
          
          // Fallback: Regex parse for malformed URLs
          if (!accessToken) {
            var fullUrl = window.location.href;
            var tokenMatch = fullUrl.match(/access_token=([^&]+)/);
            if (tokenMatch) accessToken = decodeURIComponent(tokenMatch[1]);
            var refreshMatch = fullUrl.match(/refresh_token=([^&]+)/);
            if (refreshMatch) refreshToken = decodeURIComponent(refreshMatch[1]);
            var expiresInMatch = fullUrl.match(/expires_in=([^&]+)/);
            if (expiresInMatch) expiresIn = decodeURIComponent(expiresInMatch[1]);
          }
          
          // Handle error
          if (error) {
            window.location.replace(scheme + '://oauth/auth?success=false&error=' + encodeURIComponent(errorDescription || error));
            return;
          }
          
          if (!accessToken) {
            loaderEl.style.display = 'none';
            statusEl.textContent = 'Fehler: Keine Anmeldedaten';
            statusEl.style.color = '#ef4444';
            return;
          }
          
          // Build deeplink
          var params = new URLSearchParams();
          params.set('success', 'true');
          params.set('access_token', accessToken);
          if (refreshToken) params.set('refresh_token', refreshToken);
          if (expiresIn) params.set('expires_at', (Math.floor(Date.now() / 1000) + parseInt(expiresIn, 10)).toString());
          if (tokenType) params.set('token_type', tokenType);
          
          var deeplinkUrl = scheme + '://oauth/auth#' + params.toString();
          statusEl.textContent = 'Zurück zur App...';
          
          // Immediate redirect
          window.location.replace(deeplinkUrl);
          
          // Manual fallback (500ms)
          setTimeout(function() {
            statusEl.textContent = 'Bitte kehren Sie zur App zurück';
          }, 800);
          
        } catch (e) {
          loaderEl.style.display = 'none';
          statusEl.textContent = 'Fehler: ' + e.message;
          statusEl.style.color = '#ef4444';
        }
      })();
    </script>
  </body>
</html>

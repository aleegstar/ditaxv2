<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Anmeldung...</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      .logo {
        width: 80px;
        height: 80px;
        margin-bottom: 2rem;
      }
      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1.5rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .status {
        font-size: 1rem;
        color: #888;
      }
      .error {
        color: #ef4444;
        margin-top: 1rem;
      }
      .debug {
        margin-top: 2rem;
        padding: 1rem;
        background: rgba(255,255,255,0.05);
        border-radius: 8px;
        font-size: 0.75rem;
        color: #666;
        text-align: left;
        max-width: 90vw;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/ditax-logo-new.png" alt="Ditax" class="logo" onerror="this.style.display='none'" />
      <div class="loader" id="loader"></div>
      <p class="status" id="status">Anmeldung wird verarbeitet...</p>
      <div class="debug" id="debug" style="display:none;"></div>
    </div>

    <script>
      (function() {
        var debugEl = document.getElementById('debug');
        var statusEl = document.getElementById('status');
        var loaderEl = document.getElementById('loader');
        
        function log(msg) {
          console.log('[native-callback.html]', msg);
          debugEl.style.display = 'block';
          debugEl.innerHTML += msg + '<br>';
        }
        
        function showError(msg) {
          loaderEl.style.display = 'none';
          statusEl.className = 'status error';
          statusEl.textContent = msg;
        }
        
        try {
          // Log what we received
          log('URL: ' + window.location.href);
          log('Hash: ' + window.location.hash);
          log('Search: ' + window.location.search);
          
          // Parse hash params (tokens come after #)
          var hash = window.location.hash.substring(1);
          var hashParams = new URLSearchParams(hash);
          
          // Parse query params for deeplink_scheme
          var queryParams = new URLSearchParams(window.location.search);
          var scheme = queryParams.get('deeplink_scheme') || 'ditax';
          
          log('Scheme: ' + scheme);
          
          // Extract tokens
          var accessToken = hashParams.get('access_token');
          var refreshToken = hashParams.get('refresh_token');
          var expiresIn = hashParams.get('expires_in');
          var tokenType = hashParams.get('token_type');
          var error = hashParams.get('error');
          var errorDescription = hashParams.get('error_description');
          
          log('Access token: ' + (accessToken ? accessToken.substring(0, 20) + '...' : 'null'));
          log('Refresh token: ' + (refreshToken ? 'present' : 'null'));
          log('Error: ' + (error || 'none'));
          
          // Handle OAuth error
          if (error) {
            var errorMsg = errorDescription || error;
            log('OAuth error: ' + errorMsg);
            var errorUrl = scheme + '://oauth/auth?success=false&error=' + encodeURIComponent(errorMsg);
            log('Redirecting to error deeplink: ' + errorUrl);
            window.location.replace(errorUrl);
            return;
          }
          
          // If no tokens found, show error
          if (!accessToken) {
            log('ERROR: No access token found in hash');
            showError('Fehler: Keine Anmeldedaten gefunden');
            return;
          }
          
          // Build deeplink URL with tokens
          var params = new URLSearchParams();
          params.set('success', 'true');
          params.set('access_token', accessToken);
          if (refreshToken) params.set('refresh_token', refreshToken);
          if (expiresIn) {
            var expiresAt = Math.floor(Date.now() / 1000) + parseInt(expiresIn, 10);
            params.set('expires_at', expiresAt.toString());
          }
          if (tokenType) params.set('token_type', tokenType);
          
          var deeplinkUrl = scheme + '://oauth/auth?' + params.toString();
          log('Deeplink URL: ' + deeplinkUrl.substring(0, 100) + '...');
          
          statusEl.textContent = 'Zurück zur App...';
          
          // Method 1: Direct navigation (works on iOS)
          log('Triggering deeplink...');
          window.location.replace(deeplinkUrl);
          
          // Method 2: Android Intent URL fallback
          setTimeout(function() {
            var intentUrl = 'intent://oauth/auth?' + params.toString() + 
              '#Intent;scheme=' + scheme + ';package=ch.ditax.app;end';
            log('Trying Android intent: ' + intentUrl.substring(0, 80) + '...');
            window.location.replace(intentUrl);
          }, 300);
          
          // Method 3: Show manual instructions if still here after 2s
          setTimeout(function() {
            log('Deeplink may have failed, showing manual instructions');
            statusEl.textContent = 'Bitte kehren Sie manuell zur App zurück';
          }, 2000);
          
        } catch (e) {
          log('Exception: ' + e.message);
          showError('Fehler: ' + e.message);
        }
      })();
    </script>
  </body>
</html>
